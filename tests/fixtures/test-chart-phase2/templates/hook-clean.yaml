apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "test-chart.fullname" . }}-post-install
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      containers:
        - name: post-install
          image: busybox:latest
          command: ["sh", "-c", "echo 'running post-install hook'"]
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
      restartPolicy: Never
