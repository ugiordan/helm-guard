apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "test-chart.fullname" . }}-pre-install
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
spec:
  template:
    spec:
      containers:
        - name: pre-install
          image: busybox:latest
          command: ["sh", "-c", "echo 'running pre-install hook'"]
      restartPolicy: Never
