site_name: helm-guard
site_description: Security scanner for Helm chart supply chain integrity
site_url: https://ugiordan.github.io/helm-guard
repo_url: https://github.com/ugiordan/helm-guard
repo_name: ugiordan/helm-guard

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

plugins:
  - search
  - glightbox

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/js/diagram-zoom.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Reference:
    - Rules: reference/rules.md
    - CLI: reference/cli.md
  - Architecture:
    - Overview: architecture/overview.md
  - Guides:
    - Configuration: guides/configuration.md
  - Contributing:
    - Development Setup: contributing/setup.md
