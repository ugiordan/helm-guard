name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruamel.yaml pytest
      - run: PYTHONPATH=. python -m pytest tests/ -v

  pypi:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  binaries:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller ruamel.yaml
      - name: Build binary
        run: |
          pyinstaller --onefile --name helm-guard-${{ matrix.target }} \
            --hidden-import helm_guard.checks.pinning \
            --hidden-import helm_guard.checks.injection \
            --hidden-import helm_guard.checks.trust \
            --hidden-import helm_guard.checks.security \
            --hidden-import helm_guard.checks.hooks \
            --hidden-import helm_guard.checks.olm \
            --hidden-import helm_guard.checks.deps \
            --hidden-import helm_guard.checks.provenance \
            --hidden-import helm_guard.checks.namespace \
            helm_guard/__main__.py
        shell: bash
      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/helm-guard-${{ matrix.target }}*
